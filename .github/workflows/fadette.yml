name: fadette

on:
  schedule:
    - cron: "0 */2 * * *"
    - cron: "30 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fadette
  cancel-in-progress: false

jobs:
  breath:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: One breath of the machine
        env:
          INFOMANIAK_TOKEN: ${{ secrets.INFOMANIAK_TOKEN }}
          INFOMANIAK_PRODUCT_ID: ${{ secrets.INFOMANIAK_PRODUCT_ID }}
        run: python -m src.conductor
      - name: Render the page from the archive
        run: python -m src.render
      - name: Archive (one commit per breath)
        run: |
          git config user.name  "Marcel Simplexe"
          git config user.email "marcel.simplexe@fadette.invalid"
          git add -A
          git diff --cached --quiet || git commit -m "breath $(date -u +%Y-%m-%dT%H:%MZ)"
          git pull --rebase --autostash || true
          git push || (sleep 5 && git pull --rebase --autostash && git push)
